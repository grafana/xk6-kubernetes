# v2.11.4
# Please don't remove the first line. It is used in CI to determine the golangci version

version: "2"

run:
  timeout: 5m

issues:
  # Maximum issues count per one linter. Set to 0 to disable. Default is 50.
  max-issues-per-linter: 0
  # Maximum count of issues with the same text. Set to 0 to disable. Default is 3.
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

linters:
  disable-all: true
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - cyclop
    - dogsled
    - dupl
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - forbidigo
    - forcetypeassert
    - funlen
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gocognit
    - goconst
    - gocritic
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - interfacebloat
    - lll
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - paralleltest
    - prealloc
    - predeclared
    - promlinter
    - revive
    - reassign
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace

  settings:
    exhaustive:
      default-signifies-exhaustive: true
    cyclop:
      max-complexity: 25
    dupl:
      threshold: 150
    goconst:
      min-len: 10
      min-occurrences: 4
    funlen:
      lines: 80
      statements: 60
    forbidigo:
      forbid:
        - pattern: '^(fmt\.Print(|f|ln)|print|println)$'
        - pattern: '^os\.(.*)$'
          msg: "Using anything except Signal and SyscallError from the os package is forbidden"
        - pattern: '^syscall\.[^A-Z_]+$'
          msg: "Using anything except constants from the syscall package is forbidden"
        - pattern: '^logrus\.Logger$'

  exclusions:
    # We want to try and improve the comments in the k6 codebase, so individual
    # non-golint items from the default exclusion list will gradually be added
    # to the rules below
    rules:
      # Exclude duplicate code and function length and complexity checking in test
      # files (due to common repeats and long functions in test code)
      - path: _(test|gen)\.go
        linters:
          - cyclop
          - dupl
          - gocognit
          - funlen
          - lll
      - linters:
          - staticcheck
        # Tracked in https://github.com/grafana/xk6-grpc/issues/14
        text: "The entire proto file grpc/reflection/v1alpha/reflection.proto is marked as deprecated."
      - linters:
          - staticcheck
        # tracked in https://github.com/grafana/xk6-kubernetes/issues/135
        text: 'SA1019: corev1.EndpointSubset is deprecated'
      - linters:
          - staticcheck
        # tracked in https://github.com/grafana/xk6-kubernetes/issues/135
        text: 'SA1019: corev1.Endpoints is deprecated'
      - linters:
          - forbidigo
        text: 'use of `os\.(SyscallError|Signal|Interrupt)` forbidden'
